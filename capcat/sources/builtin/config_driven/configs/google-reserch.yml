# Display name shown in the TUI and output folders.
display_name: The latest research from Google
# The root URL of this source website.
base_url: https://research.google/blog/
# How many articles to fetch from this source per run. Change if needed.
article_count: 30
# Topic category used for grouping in TUI and bundles.
category: ai
# Discovery method configuration.
discovery:
  method: rss
  rss_url: https://research.google/blog/rss/
# CSS selectors to find article links.
article_selectors:
- summary
# CSS selectors to extract article content.
content_selectors:
- summary
# CSS selectors to extract author information (empty if not used).
author_selectors: []
# CSS selectors to extract publish dates (empty if not used).
publish_date_selectors: []
