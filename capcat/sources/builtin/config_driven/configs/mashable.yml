# Display name shown in the TUI and output folders.
display_name: Mashable
# The root URL of this source website.
base_url: https://mashable.com
# How many articles to fetch from this source per run. Change if needed.
article_count: 30
# Topic category used for grouping in TUI and bundles.
category: tech
# URL patterns used to identify article links for scraping.
discovery:
  method: rss
  rss_url: http://feeds.mashable.com/Mashable
# CSS selectors used to find article links on the listing page.
article_selectors:
- summary
# CSS selectors used to extract the main article body.
content_selectors:
- summary
# CSS selectors for extracting the author name.
author_selectors: []
# CSS selectors for extracting the publication date.
publish_date_selectors: []
