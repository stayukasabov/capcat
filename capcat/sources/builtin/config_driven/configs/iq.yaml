# InfoQ Configuration
source_id: "iq"
name: "InfoQ"
# Display name shown in the TUI and output folders.
display_name: "InfoQ"
# Topic category used for grouping in TUI and bundles.
category: techpro

# The root URL of this source website.
base_url: https://www.infoq.com/news/
# RSS feed URL.
rss_url: https://feed.infoq.com

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Discovery method - use RSS for latest news articles only.
discovery:
  method: "rss"
  rss_url: "https://feed.infoq.com"
  max_articles: 30

# Article selectors (fallback for non-RSS discovery).
article_selectors:
- h3 a[href*="/news/"]
- .news-headline a

# CSS selectors to extract article content.
content_selectors:
- .article__content
- article.article
- .article-content
- .content
- .article-body

# Template configuration for HTML output.
template:
  variant: article-no-comments
  navigation:
    show_breadcrumb: true
    show_source_link: true

# HTTP request timeout in seconds.
timeout: 15
# Minimum delay between requests to avoid rate-limiting.
rate_limit: 20.0

# URL patterns to skip during article discovery.
skip_patterns:
- /about
- /contact
- /privacy
- /terms
- /profile
- /presentations/
- /interviews/
- infoq.com/presentations
- infoq.com/interviews

# Whether this source supports fetching article comments.
supports_comments: false

# Image processing configuration.
image_processing:
  selectors:
    - "article img"
    - "figure img"
    - "picture img"
    - ".article-body img"
    - "main img"
  skip_selectors:
    - "nav img"
    - "header img"
    - "footer img"
    - ".sidebar img"
  # Maximum image file size in MB. Images larger than this are skipped.
  max_image_size_mb: 5

# Per-source PDF settings.
media:
  download_pdfs: true
  max_pdf_size_mb: 10
