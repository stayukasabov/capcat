# Nature Configuration
source_id: "nature"
name: "Nature"
# Display name shown in the TUI and output folders.
display_name: "Nature"
# Topic category used for grouping in TUI and bundles.
category: science

# The root URL of this source website.
base_url: https://www.nature.com

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Discovery method - HTML scraping.
discovery:
  method: "html"
  max_articles: 30

# Article selectors for discovery.
article_selectors:
- a[href*="/articles/"]
- .c-card__link
- h3 a
- h2 a
- .article-item__title a

# CSS selectors to extract article content.
content_selectors:
- .c-article-body
- .article-body
- .post-content
- article
- main

# Template configuration for HTML output.
template:
  variant: article-no-comments
  navigation:
    show_breadcrumb: true
    show_source_link: true

# HTTP request timeout in seconds.
timeout: 10
# Retry transient errors (Timeout, ConnectionError) this many times.
# 0 = no retry (default). 1 = one extra attempt on transient failure.
max_retries: 1
# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# URL patterns to skip during article discovery.
skip_patterns:
- /about
- /contact
- /privacy
- /terms
- /subjects
- /news-events
- /collections
- /author
- nature.com/subjects
- nature.com/collections

# Whether this source supports fetching article comments.
supports_comments: false

# Image processing configuration.
image_processing:
  selectors:
    - "article img"
    - "figure img"
    - "picture img"
    - ".article-body img"
    - "main img"
  skip_selectors:
    - "nav img"
    - "header img"
    - "footer img"
    - ".sidebar img"
