# BBC Sport Configuration
source_id: "bbcsport"
name: "BBC Sport"
# Display name shown in the TUI and output folders.
display_name: "BBC Sport"
# Topic category used for grouping in TUI and bundles.
category: sports

# The root URL of this source website.
base_url: https://www.bbc.com/sport

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Discovery method - RSS feed
discovery:
  method: "rss"
  rss_url: "https://feeds.bbci.co.uk/sport/rss.xml"
  max_articles: 30

# Article selectors (fallback if RSS fails).
article_selectors:
- a[data-testid="internal-link"][href*="/sport/"]
- a[href*="/sport/"]
- h2 a[href*="/sport/"]
- h3 a[href*="/sport/"]

# CSS selectors to extract article content.
content_selectors:
- '[data-component="text-block"]'
- article
- .article-body
- .post-content
- main

# Template configuration for HTML output.
template:
  variant: article-no-comments
  navigation:
    show_breadcrumb: true
    show_source_link: true

# HTTP request timeout in seconds.
timeout: 10
# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# URL patterns to skip during article discovery.
skip_patterns:
- /live
- /video
- /av/
- /iplayer

# Whether this source supports fetching article comments.
supports_comments: false

# Image processing configuration.
image_processing:
  selectors:
    - "article img"
    - 'img[data-component="image-block"]'
    - "figure img"
    - "picture img"
    - ".ssrcss-evoj7m-Image img"

  url_patterns:
    - "bbc.com"
    - "bbc.co.uk"
    - "ichef.bbci.co.uk"

  allow_extensionless: true

  skip_selectors:
    - "nav img"
    - ".gs-c-promo-logo img"
    - ".icon img"
  # Maximum image file size in MB. Images larger than this are skipped.
  max_image_size_mb: 5
