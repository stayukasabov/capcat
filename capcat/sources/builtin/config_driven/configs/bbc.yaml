# BBC News Configuration
source_id: "bbc"
name: "BBC News"
# Display name shown in the TUI and output folders.
display_name: "BBC News"
# Topic category used for grouping in TUI and bundles.
category: news

# The root URL of this source website.
base_url: https://www.bbc.com/news

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Discovery method - HTML scraping
discovery:
  method: "html"
  max_articles: 30

# Article selectors for discovery (BBC-specific)
article_selectors:
- a[data-testid="internal-link"][href*="/news/articles/"]
- a[href*="/news/articles/"]
- h2 a[href*="/news/"]
- h3 a[href*="/news/"]

# CSS selectors to extract article content.
content_selectors:
- '[data-component="text-block"]'
- 'main article'
- 'article'
- '.article-body'
- 'main'
- '.post-content'

# Template configuration for HTML output.
template:
  variant: article-no-comments
  navigation:
    show_breadcrumb: true
    show_source_link: true

# HTTP request timeout in seconds.
timeout: 10
# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# URL patterns to skip during article discovery.
skip_patterns:
- /sport
- /weather
- /travel
- /live
- /video
- /av/
- /iplayer

# Whether this source supports fetching article comments.
supports_comments: false

# Image processing configuration.
image_processing:
  selectors:
    - "article img"
    - "figure img"
    - "picture img"
    - ".article-body img"
  skip_selectors:
    - "nav img"
    - "header img"
    - "footer img"
  # Maximum image file size in MB. Images larger than this are skipped.
  max_image_size_mb: 5

# Per-source PDF settings.
media:
  download_pdfs: false
