# IEEE Spectrum Configuration
source_id: "ieee"
name: "IEEE Spectrum"
# Display name shown in the TUI and output folders.
display_name: "IEEE Spectrum"
# Topic category used for grouping in TUI and bundles.
category: tech

# The root URL of this source website.
base_url: https://spectrum.ieee.org
# RSS feed URL.
rss_url: https://spectrum.ieee.org/feeds/feed.rss

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Discovery method - use RSS.
discovery:
  method: "rss"
  rss_url: "https://spectrum.ieee.org/feeds/feed.rss"
  max_articles: 30

# Article selectors (fallback for HTML, not used when RSS is active).
article_selectors:
- article h1 a
- .entry-title a
- .post-title a

# CSS selectors to extract article content.
content_selectors:
- .entry-content
- .post-content
- main article
- .article-content
- article

# Template configuration for HTML output.
template:
  variant: article-no-comments
  navigation:
    show_breadcrumb: true
    show_source_link: true

# HTTP request timeout in seconds.
timeout: 30
# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# URL patterns to skip during article discovery.
skip_patterns:
- /subscribe
- /login
- /register
- /podcast
- /video
- /type/
- /topic/
- /collections/
- /magazine/
- /customfeeds/
- /feed/
- /rss
- utoronto.ca
- "#comments"

# Whether this source supports fetching article comments.
supports_comments: false

# Image processing configuration.
image_processing:
  selectors:
    - "article img"
    - "figure img"
    - "picture img"
    - ".article-body img"
    - "main img"
  skip_selectors:
    - "nav img"
    - "header img"
    - "footer img"
    - ".sidebar img"
