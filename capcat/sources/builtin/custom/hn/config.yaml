# Display name shown in the TUI and output folders.
display_name: Hacker News

# The root URL of this source website.
base_url: https://news.ycombinator.com

# Topic category used for grouping in TUI and bundles.
category: techpro

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# Whether this source supports fetching article comments.
supports_comments: true

# Whether this source has comments available.
has_comments: true

# Function to use for fetching comments.
comments_function: fetch_comments

# HTTP request timeout in seconds.
timeout: 10

# Template system configuration
template:
  # Which template variant to use for articles
  variant: "article-with-comments"

  # Template data
  navigation:
    back_to_news_url: "../../news.html"
    back_to_news_text: "Back to News"
    has_comments: true
    comments_url: "comments.html"
    comments_text: "View Comments"

# ─── Hacker News API tuning ─────────────────────────────────────────────────
# These settings control how the HN Firebase API is used.
# Changes take effect immediately on the next run - no restart needed.
hn:

  # Maximum comments fetched per article.
  # Each comment is one API request. Higher values give more complete threads
  # but increase fetch time. Default: 200. Range: 10-500.
  max_comments_per_article: 200

  # How deep to follow reply chains.
  # 1 = top-level comments only. 4 = up to 4 levels of nesting.
  # Deeper values fetch more context but add more API requests.
  # Default: 4. Range: 1-8.
  max_comment_depth: 4

  # Parallel workers for comment fetching.
  # More workers fetch comments faster but use more CPU and network.
  # Keep at 5 or below to stay within HN API rate limits.
  # Default: 5. Range: 1-10.
  concurrent_workers: 5

  # Maximum hyperlinks kept per comment.
  # Excess links are stripped to keep comment text readable.
  # Default: 5. Range: 1-20.
  max_links_per_comment: 5
