# Internal source type identifier.
source_id: "substack"

# Source name (internal use).
name: "Substack"

# Display name shown in the TUI and output folders.
display_name: "Substack.com"

# The root URL of this source website.
base_url: "https://substack.com"

# Topic category used for grouping in TUI and bundles.
category: "content"

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# HTTP request timeout in seconds.
timeout: 30

# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# Whether this source supports fetching article comments.
supports_comments: false

# Hidden sources are used internally (URL pattern matching) but not shown in TUI lists.
hidden: true

url_patterns:
  - "*.substack.com"
  - "substack.com"

content_selectors:
  - ".post-content"
  - ".available-content"
  - "article"
  - ".prose"
  - "main"

image_selectors:
  - ".post-content img"
  - "figure img"
  - "img"

skip_patterns:
  - "/subscribe"
  - "/account/login"
  - "/sign-in"

rss:
  enabled: true
  feed_path: "/feed"
