# Display name shown in the TUI and output folders.
display_name: Lobsters

# The root URL of this source website.
base_url: https://lobste.rs

# Topic category used for grouping in TUI and bundles.
category: techpro

# How many articles to fetch from this source per run. Change if needed.
article_count: 30

# Minimum delay between requests to avoid rate-limiting.
rate_limit: 1.0

# Whether this source supports fetching article comments.
supports_comments: true

# Whether this source has comments available.
has_comments: true

# Function to use for fetching comments.
comments_function: fetch_comments

# HTTP request timeout in seconds.
timeout: 10

# RSS configuration (REQUIRED - robots.txt blocks HTML scraping)
rss_config:
  feed_url: "https://lobste.rs/newest.rss"
  use_rss_content: false  # RSS provides links only, fetch full content from article URLs

# Template system configuration
template:
  # Which template variant to use for articles
  variant: "article-with-comments"

  # Template data
  navigation:
    back_to_news_url: "../../news.html"
    back_to_news_text: "Back to News"
    has_comments: true
    comments_url: "comments.html"
    comments_text: "View Comments"
