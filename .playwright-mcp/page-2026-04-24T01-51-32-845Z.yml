                        - generic [ref=e1410]:
                          - generic [ref=e1411]:
                            - text: I don't know where people get this idea.
                            - paragraph [ref=e1412]: America has several sets of eminent domain laws depending on the jurisdiction. The most coercive is federal eminent domain law specifically as it relates to building infrastructure like railways and highways.
                            - paragraph [ref=e1413]: It's set up so that you can take the land first and eventually go back around and decide on what the right price should have been.
                            - paragraph [ref=e1414]: Not only does it superscede state and local law, federal infrastructure projects are also not bound by state laws like CEQA.
                            - paragraph [ref=e1415]: You can even apply federal eminent domain law by e.g. transferring a state-level project to the Army Corps of Engineers.
                            - paragraph [ref=e1416]: What America is lacking in these projects is will, not means. The federal government could take your house and run a train through it by the end of the week if they wanted, doesn't matter where you live.
                            - paragraph [ref=e1417]: "[edit] In fact some states even ceded their eminent domain rights to private railways."
                            - paragraph [ref=e1418]:
                              - link "https://ij.org/press-release/appeals-court-sides-with-railro..." [ref=e1419] [cursor=pointer]:
