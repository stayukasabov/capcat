                - generic [ref=e51]:
                  - text: "> One engineer at NVIDIA who had early access to the model went as far as to say: \"Losing access to GPT‑5.5 feels like I've had a limb amputated.”"
                  - paragraph [ref=e52]: This quote is more sinister than I think was intended; it likely applies to all frontier coding models. As they get better, we quickly come to rely on them for coding. It's like playing a game on God Mode. Engineers become dependent; it's truly addictive.
                  - paragraph [ref=e53]: This matches my own experience and unease with these tools. I don't really have the patience to write code anymore because I can one shot it with frontier models 10x faster. My role has shifted, and while it's awesome to get so much working so quickly, the fact is, when the tokens run out, I'm basically done working.
                  - paragraph [ref=e54]: It's literally higher leverage for me to go for a walk if Claude goes down than to write code because if I come back refreshed and Claude is working an hour later then I'll make more progress than mentally wearing myself out reading a bunch of LLM generated code trying to figure out how to solve the problem manually.
                  - paragraph [ref=e55]: Anyway, it continues to make me uneasy, is all I'm saying.
