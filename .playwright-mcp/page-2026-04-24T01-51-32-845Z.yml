                        - generic [ref=e3787]:
                          - generic [ref=e3788]:
                            - text: While I agree with your sentiment, I just want to say that if your approach is to have the LLM read every file into context, or you're working in some gigantic thread (using the million token capacity most frontier models have) that's really not the best way to do it.
                            - paragraph [ref=e3789]: Not even a human would work that way... you wouldn't open 300 different python files and then try to memorize the contents of every single file before writing your first code-change.
                            - paragraph [ref=e3790]: Additionally, you're going to have worse performance on longer context sizes anyways, so you should be doing it for reasons other than cost [1].
                            - paragraph [ref=e3791]: "Things that have helped me manage context sizes (working in both Python and kdb+/q):"
                            - paragraph [ref=e3792]: "- Keep your AGENTS.md small but useful, in it you can give rules like \"every time you work on a file in the `combobulator` module, you MUST read the `combobulator/README.md`. And in those README's you point to the other files that are relevant etc. And of course you have Claude write the READMEs for you..."
                            - paragraph [ref=e3793]: "- Don't let logs and other output fill up your context. Tell the agent to redirect logs and then grep over them, or run your scripts with a different loglevel."
                            - paragraph [ref=e3794]: "- Use tools rather than letting it go wild with `python3 -c`. These little scripts eat context like there's no tomorrow. I've seen the bots write little python scripts that send hundreds of lines of JSON into the context."
                            - paragraph [ref=e3795]: "- This last tip is more subjective but I think there's value in reviewing and cleaning up the LLM-generated code once it starts looking sloppy (for example seeing lots of repetitive if-then-elses, etc.). In my opinion when you let it start building patches & duct-tape on top of sloppy original code it's like a combinatorial explosion of tokens. I guess this isn't really \"vibe\" coding per se."
                            - paragraph [ref=e3796]:
                              - text: "[1]"
                              - link "https://arxiv.org/html/2602.06319v1" [ref=e3797] [cursor=pointer]:
                                - /url: https://arxiv.org/html/2602.06319v1
                          - paragraph [ref=e3799]:
                            - link "reply" [ref=e3802] [cursor=pointer]:
                              - /url: reply?id=47883655&goto=item%3Fid%3D47881349%2347883655
            - row "upvote noosphr 2 hours ago | | | [-] Yes I agree with all of that. The way I let my agents interact with my code bases is through a 70s BSD Unix like interface, ed, grep, ctags, etc. using Emacs as the control plane. It is surprisingly sparing on tokens, which makes sense since those things were designed to work with a teletype. Worth noting is that by the times you start doing refactoring the agents are basically a smarter google with long form auto complete. All my code bases use that pattern and I'm the ultimate authority on what gets added or removed. My token spend is 10% to 1% of what the average in the team is and I'm the only one who knows what's happening under the hood. reply" [ref=e3803]:
