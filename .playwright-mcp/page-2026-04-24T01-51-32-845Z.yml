                            - paragraph [ref=e2665]: That has always been the beauty of free markets - it's self healing and calibrating. You don't need a big powerful overseer to ensure things are right.
                            - paragraph [ref=e2666]: Competing with customers is a way to lose business fast.
                            - paragraph [ref=e2667]: "For example:"
