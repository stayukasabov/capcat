            - row "upvote noosphr 1 hour ago | | | [-] The reason why labor is weak relative to capital is that there is a huge number of somewhat fungible suppliers, viz. humans, and that they all need to work constantly to keep themselves alive. If we assume that ai makes humans obsolete then you end up in a situation where your workforce is effectively perfectly unionised against you and the only thing you can do is choose which union you hire. If you think you can bring them to the negotiation table by starving them all the providers are dozens to thousands of times bigger than you are. This is a completely new dynamic that none of the business signing up for ai have ever seen before. reply" [ref=e2391]:
