            - row "upvote DenisM 2 hours ago | | | [-] > you are still deterministically creating something you understand in depth with individual pieces you understand You’re overestimating determinism. In practice most of our code is written such that it works most of the time. This is why we have bugs in the best and most critical software. I used to think that being able to write a deterministic hello world app translates to writing deterministic larger system. It’s not true. Humans make mistakes. From an executives point of view you have humans who make mistakes and agents who make mistakes. Self driving cars don’t need to be perfect they just need to make fewer mistakes. reply" [ref=e3036]:
