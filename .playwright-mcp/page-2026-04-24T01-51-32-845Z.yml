                            - paragraph [ref=e5322]: I believe this is a major part of it. People cannot fathom what the industrial countries look like because basically nothing is made in the west anymore. There are literally hundreds of millions of people that go towards making the western economies profitable who get paid nothing to do it and live in filthy polluted slums for our benefit.
