                        - generic [ref=e452]:
                          - generic [ref=e453]:
                            - text: "LLMs cannot possess consciousness for three reasons: they execute as a sequence of Transformer blocks with extremely limited information exchange, these blocks are simple feed-forward networks with no recurrent connections, and the computer hardware follows a modular design."
                            - paragraph [ref=e454]: "Shardlow & Przybyła, \"Deanthropomorphising NLP: Can a Language Model Be Conscious?\" (PLOS One, 2024)"
                            - paragraph [ref=e455]: "Nature: \"There is no such thing as conscious artificial intelligence\" (2025)"
                            - paragraph [ref=e456]: They argue that the association between consciousness and LLMs is deeply flawed, and that mathematical algorithms implemented on graphics cards cannot become conscious because they lack a complex biological substrate. They also introduce the useful concept of "semantic pareidolia" - we pattern-match consciousness onto things that merely talk convincingly.
                            - paragraph [ref=e457]: They are making a strong argument and I think they are correct. But really these are two different things as I said originally.
