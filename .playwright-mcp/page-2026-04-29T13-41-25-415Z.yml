    - generic [ref=e52]:
      - heading "Two Complete Interfaces, One Powerful Backend" [level=2] [ref=e53]
      - paragraph [ref=e54]: Capcat offers two modes optimized for different workflows - both sharing a unified backend for consistent, reliable results.
