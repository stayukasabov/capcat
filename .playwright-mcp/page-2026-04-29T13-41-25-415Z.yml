          - heading "Bulk RSS Fetching" [level=2] [ref=e69]
          - paragraph [ref=e70]: Archive from multiple sources simultaneously. Predefined bundles (tech, news, science, AI) or create custom selections.
        - generic [ref=e71]:
          - img "Document folder icon with Markdown symbol" [ref=e73]
          - heading "Local Markdown Storage" [level=2] [ref=e74]
          - paragraph [ref=e75]: Permanent archives in Markdown format. Integrate seamlessly with Obsidian, Notion, or any note-taking system.
        - generic [ref=e76]:
          - img "Web page icon with HTML brackets" [ref=e78]
          - heading "HTML Generation" [level=2] [ref=e79]
          - paragraph [ref=e80]: Optional HTML output with customizable themes. Color-coded sources, visual hierarchy, shareable archives.
