title: Capcat Documentation
url: "https://capcat.org"
baseurl: ""

# Do not use any GitHub Pages theme — we provide our own layout
theme: ~

# All generated .md files include front matter — no optional-front-matter plugin needed
plugins:
  - jekyll-titles-from-headings

# Exclude local tooling from the built site
exclude:
  - Gemfile
  - Gemfile.lock
  - manifest.txt
  - UTILITY-CLASSES.md
  - ACCESSIBILITY-REMEDIATION-PLAN.md
  - bugs/
  - superpowers/
