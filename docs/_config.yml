title: Capcat Documentation
url: "https://capcat.org"
baseurl: ""

# No theme - layout is provided by docs/_layouts/default.html
theme: ~

# Exclude files that would conflict with the existing homepage or are not public docs
exclude:
  - Gemfile
  - Gemfile.lock
  - manifest.txt
  - UTILITY-CLASSES.md
  - ACCESSIBILITY-REMEDIATION-PLAN.md
  - index.md
  - README.md
  - bugs/
  - superpowers/
