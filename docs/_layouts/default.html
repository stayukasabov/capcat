<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}Capcat</title>
  <meta name="description" content="Capcat documentation">
  <link rel="stylesheet" href="/css/design-system.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" type="image/x-icon" href="/icons/Capcat.ico">
  <style>
    .docs-prose {
      padding: var(--space-xl, 3rem) 0;
      font-family: var(--font-family-body);
      color: var(--color-text, #1a1a1a);
      line-height: 1.7;
    }
    .docs-prose h1,
    .docs-prose h2,
    .docs-prose h3,
    .docs-prose h4 {
      font-family: var(--font-family-heading);
      font-weight: var(--weight-heading);
      margin: 2rem 0 0.75rem;
      line-height: 1.25;
    }
    .docs-prose h1 { font-size: 2rem; margin-top: 0; }
    .docs-prose h2 { font-size: 1.5rem; border-bottom: 1px solid var(--color-border, #e5e5e5); padding-bottom: 0.4rem; }
    .docs-prose h3 { font-size: 1.2rem; }
    .docs-prose p  { margin: 0 0 1rem; }
    .docs-prose ul,
    .docs-prose ol { margin: 0 0 1rem 1.5rem; }
    .docs-prose li { margin-bottom: 0.25rem; }
    .docs-prose a  { color: var(--color-brand, #f1540d); text-decoration: none; }
    .docs-prose a:hover { text-decoration: underline; }
    .docs-prose code {
      font-family: var(--font-family-mono);
      font-size: 0.875em;
      background: var(--color-surface, #f5f5f5);
      padding: 0.15em 0.35em;
      border-radius: 3px;
    }
    .docs-prose pre {
      background: var(--color-surface, #f5f5f5);
      border: 1px solid var(--color-border, #e5e5e5);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 0 0 1.5rem;
    }
    .docs-prose pre code {
      background: none;
      padding: 0;
      font-size: 0.875rem;
    }
    .docs-prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 0 0 1.5rem;
      font-size: 0.9rem;
    }
    .docs-prose th,
    .docs-prose td {
      border: 1px solid var(--color-border, #e5e5e5);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    .docs-prose th {
      background: var(--color-surface, #f5f5f5);
      font-weight: var(--weight-emphasis);
    }
    .docs-prose blockquote {
      border-left: 3px solid var(--color-brand, #f1540d);
      margin: 0 0 1rem;
      padding: 0.5rem 1rem;
      color: var(--color-text-muted, #555);
    }
    .docs-prose hr {
      border: none;
      border-top: 1px solid var(--color-border, #e5e5e5);
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  {% include header.html %}
  <main id="main-content">
    <div class="container">
      <div class="docs-prose">
        {{ content }}
      </div>
    </div>
  </main>
  {% include footer.html %}
  <script src="/js/main.js" defer></script>
</body>
</html>
