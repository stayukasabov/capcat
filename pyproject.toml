    "*/capcat/core/source_system/source_backup_manager*",
    "*/capcat/core/source_system/source_config*",
    "*/capcat/core/source_system/source_config_generator*",
    "*/capcat/core/source_system/source_factory*",
    "*/capcat/core/source_system/validation_engine*",
    "*/capcat/core/config/source_base*",
    "*/capcat/core/config/source_registry*",
    "*/capcat/core/config.py",
    "*/capcat/htmlgen/*",
    "*/capcat/sources/base/*",
    "*/capcat/sources/builtin/*",
    "*/capcat/sources/specialized/*",
    "*/capcat/metrics/*",
]

[tool.coverage.report]
fail_under = 80
show_missing = true

[tool.ruff]
line-length = 79
target-version = "py38"

[tool.mypy]
strict = true
python_version = "3.8"
